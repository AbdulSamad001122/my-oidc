<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Choose Account — MyOIDC</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            bg: '#000000',
            surface: '#09090b',
            'surface-hover': '#18181b',
            border: '#27272a',
            green: '#10b981',
            'green-dim': '#059669',
            text: '#f9fafb',
            'text-muted': '#a1a1aa',
            error: '#ef4444'
          },
          fontFamily: {
            sans: ['Inter', 'sans-serif'],
            mono: ['SFMono-Regular', 'Consolas', 'monospace']
          },
          animation: {
            toastIn: 'toastIn 0.25s ease',
            spin: 'spin 0.7s linear infinite',
            pulseGlow: 'pulseGlow 2s cubic-bezier(0.4, 0, 0.6, 1) infinite',
          },
          keyframes: {
            toastIn: {
              '0%': { opacity: 0, transform: 'translateX(20px)' },
              '100%': { opacity: 1, transform: 'translateX(0)' }
            },
            pulseGlow: {
              '0%, 100%': { opacity: 1 },
              '50%': { opacity: .5 },
            }
          },
          boxShadow: {
            'glow': '0 0 40px -10px rgba(16, 185, 129, 0.15)',
            'glass': 'inset 0 1px 0 0 rgba(255, 255, 255, 0.05)',
          }
        }
      }
    }
  </script>
</head>
<body class="bg-bg bg-[radial-gradient(ellipse_at_top,_var(--tw-gradient-stops))] from-green/10 via-bg to-bg text-text font-sans flex justify-center items-center min-h-screen antialiased">
  <div class="bg-surface/60 border border-border shadow-glow shadow-glass backdrop-blur-xl rounded-[18px] py-8 px-7 w-full max-w-[420px]">
    <div class="w-11 h-11 bg-green rounded-[10px] flex items-center justify-center mx-auto mb-6 text-xl">🔐</div>
    <h1 class="text-xl font-bold text-center mb-1">Choose an account</h1>
    <p class="text-center text-[0.85rem] text-text-muted mb-7">to continue to your application</p>

    <div id="accountList" class="flex flex-col gap-2">
      <div class="h-[62px] rounded-[12px] bg-border animate-pulse"></div>
      <div class="h-[62px] rounded-[12px] bg-border animate-pulse"></div>
    </div>

    <div class="flex items-center gap-3 my-4">
      <div class="flex-1 border-t border-border"></div>
      <span class="text-xs text-text-muted whitespace-nowrap">or</span>
      <div class="flex-1 border-t border-border"></div>
    </div>

    <div class="flex items-center gap-4 py-3.5 px-4 rounded-[12px] border border-dashed border-border cursor-pointer transition-colors duration-150 text-text-muted hover:border-green hover:text-green hover:bg-surface-hover" id="addAccountBtn">
      <div class="w-10 h-10 rounded-full border-2 border-dashed border-current flex items-center justify-center text-lg shrink-0">+</div>
      <span class="text-[0.9rem] font-medium">Add another account</span>
    </div>
  </div>

  <script>
    const urlParams = new URLSearchParams(window.location.search);
    const queryParams = window.location.search;

    document.getElementById('addAccountBtn').addEventListener('click', () => {
      window.location.href = `/o/authorize${queryParams}&prompt=login`;
    });

    async function fetchAccounts() {
      const res = await fetch('/o/session');
      const data = await res.json();
      const list = document.getElementById('accountList');
      list.innerHTML = '';

      if (data.users && data.users.length > 0) {
        data.users.forEach(user => {
          const card = document.createElement('div');
          card.className = 'flex items-center gap-4 bg-bg border border-border py-3.5 px-4 rounded-[12px] cursor-pointer transition-colors duration-150 hover:border-green hover:bg-surface-hover';
          card.innerHTML = `
            <div class="w-10 h-10 rounded-full bg-green text-black flex items-center justify-center font-bold text-lg shrink-0">${user.avatar}</div>
            <div class="flex-1 min-w-0">
              <div class="font-semibold text-[0.9rem]">${user.name || 'User'}</div>
              <div class="text-[0.8rem] text-text-muted truncate">${user.email}</div>
            </div>
            <span class="text-text-muted text-base shrink-0">›</span>
          `;
          card.addEventListener('click', () => {
            window.location.href = `/o/consent${queryParams}&selected_user_id=${user.id}`;
          });
          list.appendChild(card);
        });
      } else {
        window.location.href = `/o/authorize${queryParams}&prompt=login`;
      }
    }

    fetchAccounts();
  </script>
</body>
</html>
