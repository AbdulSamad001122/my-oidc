<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Grant Access — MyOIDC</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            bg: '#0a0f0a',
            surface: '#111a11',
            border: '#1f2f1f',
            green: '#22c55e',
            'green-dim': '#16a34a',
            text: '#e8f5e9',
            'text-muted': '#6b8f6b'
          },
          fontFamily: {
            sans: ['Inter', 'sans-serif']
          },
          animation: {
            toastIn: 'toastIn 0.25s ease',
            spin: 'spin 0.7s linear infinite',
          },
          keyframes: {
            toastIn: {
              '0%': { opacity: 0, transform: 'translateX(20px)' },
              '100%': { opacity: 1, transform: 'translateX(0)' }
            }
          }
        }
      }
    }
  </script>
</head>
<body class="bg-bg text-text font-sans flex justify-center items-center min-h-screen antialiased">
  <div id="toast-container" class="fixed top-5 right-5 flex flex-col gap-2.5 z-[9999]"></div>

  <div class="bg-surface border border-border rounded-[18px] py-10 px-8 w-full max-w-[400px] text-center">
    <div class="w-11 h-11 bg-green rounded-[10px] flex items-center justify-center mx-auto mb-6 text-xl">🔑</div>
    <h1 class="text-[1.25rem] font-bold mb-1.5">Grant Access</h1>
    <p class="text-[0.875rem] text-text-muted mb-7">This application is requesting permission to access your account.</p>

    <div class="bg-bg border border-border rounded-[12px] py-4 px-5 mb-7 text-left">
      <div class="text-[0.75rem] font-semibold text-text-muted uppercase tracking-wider mb-3">This app will be able to see</div>
      <div class="flex items-center gap-3 py-2 text-[0.875rem]">
        <div class="w-7 h-7 rounded-md bg-[#0d2d0d] border border-[#166534] flex items-center justify-center text-[0.85rem] shrink-0">👤</div>
        <span class="text-text">Your profile information (name, avatar)</span>
      </div>
      <div class="flex items-center gap-3 py-2 text-[0.875rem] border-t border-border mt-1 pt-3">
        <div class="w-7 h-7 rounded-md bg-[#0d2d0d] border border-[#166534] flex items-center justify-center text-[0.85rem] shrink-0">✉️</div>
        <span class="text-text">Your email address</span>
      </div>
      <div class="flex items-center gap-3 py-2 text-[0.875rem] border-t border-border mt-1 pt-3">
        <div class="w-7 h-7 rounded-md bg-[#0d2d0d] border border-[#166534] flex items-center justify-center text-[0.85rem] shrink-0">✓</div>
        <span class="text-text">Email verification status</span>
      </div>
    </div>

    <button class="w-full py-3.5 bg-green text-[#0a0f0a] border-none rounded-lg text-[0.925rem] font-bold cursor-pointer transition-all duration-150 hover:bg-green-dim active:scale-98 disabled:opacity-55 disabled:cursor-not-allowed mb-3 flex items-center justify-center gap-2" id="allowBtn">Allow Access</button>
    <button class="w-full py-3 bg-transparent text-[#f87171] border border-[#3f1414] rounded-lg text-[0.9rem] font-semibold cursor-pointer transition-colors duration-150 hover:bg-[rgba(248,113,113,0.08)]" id="cancelBtn">Cancel</button>
  </div>

  <script>
    function showToast(message, type = 'error') {
      const container = document.getElementById('toast-container');
      const toast = document.createElement('div');
      const styleClass = type === 'success' ? 'bg-[#0d2d0d] border-[#166534] text-[#86efac]' : 'bg-[#2d0d0d] border-[#991b1b] text-[#fca5a5]';
      const icon = type === 'success' ? '✓' : '✕';
      toast.className = `flex items-center gap-3 py-[0.85rem] px-[1.1rem] rounded-[12px] text-[0.875rem] font-medium min-w-[240px] max-w-[340px] border animate-toastIn ${styleClass}`;
      toast.innerHTML = `
        <span class="text-base shrink-0">${icon}</span>
        <span>${message}</span>
        <button class="ml-auto bg-transparent border-none text-current cursor-pointer opacity-60 hover:opacity-100 text-base leading-none p-0 w-auto" onclick="this.parentElement.remove()">✕</button>
      `;
      container.appendChild(toast);
      setTimeout(() => toast.remove(), 4000);
    }

    const urlParams = new URLSearchParams(window.location.search);
    const client_id = urlParams.get('client_id');
    const redirect_uri = urlParams.get('redirect_uri');
    const state = urlParams.get('state');
    const selected_user_id = urlParams.get('selected_user_id');

    document.getElementById('allowBtn').addEventListener('click', async () => {
      const btn = document.getElementById('allowBtn');
      btn.disabled = true;
      btn.innerHTML = '<div class="w-4 h-4 border-2 border-[rgba(10,15,10,0.3)] border-t-[#0a0f0a] rounded-full animate-spin"></div>';

      try {
        const res = await fetch('/o/consent', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ client_id, redirect_uri, state, selected_user_id })
        });

        const data = await res.json();
        if (res.ok && data.redirectUrl) {
          window.location.href = data.redirectUrl;
        } else {
          showToast(data.message || 'Authorization failed.');
          btn.innerHTML = 'Allow Access';
          btn.disabled = false;
        }
      } catch {
        showToast('Network error. Please try again.');
        btn.innerHTML = 'Allow Access';
        btn.disabled = false;
      }
    });

    document.getElementById('cancelBtn').addEventListener('click', () => {
      if (redirect_uri) {
        let cancelUrl = `${redirect_uri}?error=access_denied`;
        if (state) cancelUrl += `&state=${encodeURIComponent(state)}`;
        window.location.href = cancelUrl;
      }
    });
  </script>
</body>
</html>
