<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Error — MyOIDC</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            bg: '#000000',
            surface: '#09090b',
            'surface-hover': '#18181b',
            border: '#27272a',
            green: '#10b981',
            'green-dim': '#059669',
            text: '#f9fafb',
            'text-muted': '#a1a1aa',
            error: '#ef4444'
          },
          fontFamily: {
            sans: ['Inter', 'sans-serif'],
            mono: ['SFMono-Regular', 'Consolas', 'monospace']
          },
          animation: {
            toastIn: 'toastIn 0.25s ease',
            spin: 'spin 0.7s linear infinite',
            pulseGlow: 'pulseGlow 2s cubic-bezier(0.4, 0, 0.6, 1) infinite',
          },
          keyframes: {
            toastIn: {
              '0%': { opacity: 0, transform: 'translateX(20px)' },
              '100%': { opacity: 1, transform: 'translateX(0)' }
            },
            pulseGlow: {
              '0%, 100%': { opacity: 1 },
              '50%': { opacity: .5 },
            }
          },
          boxShadow: {
            'glow': '0 0 40px -10px rgba(16, 185, 129, 0.15)',
            'glass': 'inset 0 1px 0 0 rgba(255, 255, 255, 0.05)',
          }
        }
      }
    }
  </script>
</head>
<body class="bg-bg bg-[radial-gradient(ellipse_at_top,_var(--tw-gradient-stops))] from-green/10 via-bg to-bg text-text font-sans flex justify-center items-center min-h-screen antialiased">
  <div class="bg-surface/60 border border-border shadow-glow shadow-glass backdrop-blur-xl rounded-[18px] py-10 px-8 w-full max-w-[400px] text-center">
    <div class="w-12 h-12 bg-[#2d0d0d] border border-[#991b1b] text-error rounded-full flex items-center justify-center mx-auto mb-6 text-2xl font-bold">!</div>
    <h1 class="text-xl font-bold text-text mb-3">Authorization Error</h1>
    <p id="errorMsg" class="text-[0.925rem] text-text-muted mb-8">An unknown error occurred.</p>
    <a href="/" class="inline-block w-full py-3 bg-green text-black rounded-lg text-[0.925rem] font-bold transition-all hover:bg-green-dim">Return to Home</a>
  </div>

  <script>
    const urlParams = new URLSearchParams(window.location.search);
    const msg = urlParams.get('msg');
    if (msg) {
      document.getElementById('errorMsg').textContent = msg;
    }
  </script>
</body>
</html>
